name: Render Keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          set -euo pipefail

          URL="https://nxs-streamers-backend.onrender.com/api/health"

          for attempt in 1 2 3; do
            code=$(curl -L -sS -o /tmp/render-health.txt -w "%{http_code}" --max-time 20 "$URL" || true)
            echo "Attempt $attempt status: $code"
            cat /tmp/render-health.txt || true

            if [ "$code" = "200" ]; then
              exit 0
            fi

            sleep 20
          done

          echo "Render backend is still unavailable after retries."
          exit 1
